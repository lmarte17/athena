<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athena</title>
    <style>
      :root {
        --bg: #0f1418;
        --panel: #1a2127;
        --text: #ecf2f8;
        --muted: #94a6b8;
        --good: #35c88a;
        --warn: #efb544;
        --bad: #eb6a5b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 16px;
        background: radial-gradient(120% 120% at 90% 5%, #243645 0%, var(--bg) 55%);
        color: var(--text);
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 14px;
      }
      .title {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--bad);
      }
      .dot.connecting {
        background: var(--warn);
      }
      .dot.live {
        background: var(--good);
      }
      .status {
        color: var(--muted);
        text-transform: capitalize;
      }
      .ptt {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        font-weight: 600;
        color: #0f1418;
        background: #d7e8f7;
      }
      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }
      .log {
        margin-top: 12px;
        border-radius: 10px;
        padding: 8px;
        min-height: 56px;
        max-height: 56px;
        overflow: auto;
        background: rgba(0, 0, 0, 0.2);
        color: #c8d5e1;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="title">Athena</p>
      <div class="status-row">
        <div id="dot" class="dot"></div>
        <span id="status" class="status">Disconnected</span>
      </div>
      <button class="ptt" type="button">Push To Talk (WIP)</button>
      <div class="hint">WebSocket status updates from <code>ws://localhost:8000/ws</code>.</div>
      <div id="log" class="log">Waiting for backend messages...</div>
    </div>

    <script>
      const statusLabel = document.getElementById("status");
      const statusDot = document.getElementById("dot");
      const logEl = document.getElementById("log");

      function setStatus(raw) {
        const status = (raw || "disconnected").toLowerCase();
        statusLabel.textContent = status;
        statusDot.className = "dot " + (status === "live" || status === "connecting" ? status : "");
      }

      function appendLog(text) {
        logEl.textContent = text;
      }

      async function initialize() {
        const tauri = window.__TAURI__;
        if (!tauri || !tauri.core) {
          appendLog("Tauri API not available.");
          return;
        }

        try {
          const current = await tauri.core.invoke("get_connection_status");
          setStatus(current);
        } catch (err) {
          appendLog("Could not load initial status: " + err);
        }

        await tauri.event.listen("connection-status", (event) => {
          setStatus(event.payload?.status);
        });

        await tauri.event.listen("backend-text", (event) => {
          appendLog(String(event.payload ?? ""));
        });
      }

      initialize();
    </script>
  </body>
</html>
